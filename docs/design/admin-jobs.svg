  <rect x="288" y="196" width="1072" height="448" rx="8" fill="#ffffff" stroke="#e5e8eb"/>
  <g font-family="Segoe UI, Arial" font-size="13">
    <text x="316" y="236" fill="#64717a">Job ID</text><text x="530" y="236" fill="#64717a">Schedule</text><text x="708" y="236" fill="#64717a">Zone</text><text x="878" y="236" fill="#64717a">Executor</text><text x="1082" y="236" fill="#64717a">Next Fire</text><text x="1250" y="236" fill="#64717a">Actions</text>
    <line x1="316" y1="252" x2="1328" y2="252" stroke="#edf0f2"/>
    <text x="316" y="288" fill="#172026">remote-example-job</text><text x="530" y="288" fill="#172026">*/5 * * * * *</text><text x="708" y="288" fill="#64717a">Asia/Shanghai</text><text x="878" y="288" fill="#172026">example-executor</text><text x="1082" y="288" fill="#172026">22:20:05</text><text x="1250" y="288" fill="#1d4ed8">Trigger</text>
    <text x="316" y="340" fill="#172026">billing-daily-report</text><text x="530" y="340" fill="#172026">0 30 22 * * *</text><text x="708" y="340" fill="#64717a">Asia/Shanghai</text><text x="878" y="340" fill="#172026">billing-executor</text><text x="1082" y="340" fill="#172026">22:30:00</text><text x="1250" y="340" fill="#1d4ed8">Edit</text>
    <text x="316" y="392" fill="#172026">inventory-sync</text><text x="530" y="392" fill="#172026">0 */10 * * * *</text><text x="708" y="392" fill="#64717a">UTC</text><text x="878" y="392" fill="#172026">inventory-executor</text><text x="1082" y="392" fill="#172026">14:30:00</text><text x="1250" y="392" fill="#1d4ed8">Pause</text>

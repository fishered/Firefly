# Firefly standalone server configuration.
# Common runtime settings live here. Storage-specific settings live in config/profiles/*.properties.
#
# Default local profile:
# - pg: PostgreSQL on 127.0.0.1:5432/firefly, user postgres, password 123456
# - h2: local file persistence in ./data/firefly
# - memory: in-memory storage for quick experiments
firefly.config.profile=pg

firefly.node.mode=standalone
firefly.node.name=firefly-standalone
firefly.node.roles=api,gateway,scheduler
firefly.plugins=metrics-prometheus

# Local-only security credentials. Cluster mode rejects these exact development values.
firefly.security.jwt.enabled=true
firefly.security.jwt.secret=firefly-local-development-signing-secret-unsafe-change-me
firefly.security.jwt.issuer=firefly
firefly.security.jwt.access-token-ttl=PT1H

# Created once in firefly_user when the account does not exist. Later restarts never overwrite it.
firefly.security.admin.bootstrap-username=admin
firefly.security.admin.bootstrap-password=local-admin-secret

# Generate the shared Executor Integration Key from the Admin UI. Only its digest is stored in JDBC.

# Shared cluster invariant. Changing it requires the explicit reshard operation.
firefly.scheduler.shard-count=32

firefly.admin-http.host=127.0.0.1
firefly.admin-http.port=9710

firefly.metrics.prometheus.host=127.0.0.1
firefly.metrics.prometheus.port=9711

firefly.executor.gateway.netty.port=9700
# Standalone can create a definition on first registration. Set false for controlled cluster registration.
firefly.executor.registration.auto-create-definition=true

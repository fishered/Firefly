# Firefly standalone server configuration.
# Common runtime settings live here. Storage-specific settings live in config/profiles/*.properties.
#
# Default local profile:
# - pg: PostgreSQL on 127.0.0.1:5432/firefly, user postgres, password 123456
# - h2: local file persistence in ./data/firefly
# - memory: in-memory storage for quick experiments
firefly.config.profile=pg

firefly.node.mode=standalone
firefly.node.name=firefly-standalone
firefly.node.roles=api,gateway,scheduler
firefly.plugins=metrics-prometheus

# HA timing contract: membership timeout stays below the fenced shard lease duration.
firefly.scheduler.shard-count=32
firefly.scheduler.max-due-records-per-tick=10000
firefly.scheduler.max-idle-wakeup=PT0.5S
firefly.scheduler.coordination.reconcile-interval=PT1S
firefly.scheduler.coordination.node-timeout=PT5S
firefly.scheduler.coordination.lease-duration=PT10S
firefly.jdbc.clock.sync-interval=PT30S
firefly.jdbc.clock.drift-warning-threshold=PT1S

firefly.dispatch.outbox.poll-interval=PT0.2S
firefly.dispatch.outbox.claim-batch-size=50
firefly.dispatch.outbox.claim-duration=PT15S
firefly.dispatch.outbox.remote-ack-timeout=PT10S
firefly.dispatch.outbox.max-attempts=5
firefly.dispatch.outbox.max-retry-backoff=PT30S

firefly.execution.maintenance.initial-delay=PT1S
firefly.execution.maintenance.interval=PT5S
firefly.execution.maintenance.retention=P30D
firefly.execution.maintenance.timeout-batch-size=200
firefly.execution.maintenance.cleanup-batch-size=500

firefly.admin-http.host=127.0.0.1
firefly.admin-http.port=9710
# Set in production through FIREFLY_ADMIN_HTTP_API_TOKEN.
firefly.admin-http.api-token=
firefly.admin-http.reader-token=
firefly.admin-http.operator-token=
firefly.admin-http.admin-token=

firefly.metrics.prometheus.host=127.0.0.1
firefly.metrics.prometheus.enabled=true
firefly.metrics.prometheus.port=9711

firefly.executor.gateway.netty.port=9700
firefly.executor.gateway.netty.result-queue-capacity=10000
firefly.executor.gateway.netty.max-frame-length=65536
firefly.executor.gateway.netty.tls.reload-interval=PT30S
firefly.executor.gateway.netty.tls.enabled=false
firefly.executor.gateway.netty.tls.certificate-chain=
firefly.executor.gateway.netty.tls.private-key=
firefly.executor.gateway.netty.tls.private-key-password=
firefly.executor.gateway.netty.tls.trust-certificates=
firefly.executor.gateway.netty.tls.require-client-auth=false
# Cross-Gateway forwarding. Keep port 0 for the all-connected topology.
# In a routed cluster, give every Gateway a unique port/address and the same auth token.
firefly.executor.gateway.internal.host=127.0.0.1
firefly.executor.gateway.internal.port=0
firefly.executor.gateway.internal.advertised-address=
firefly.executor.gateway.internal.auth-token=
firefly.executor.gateway.instance-location-refresh-interval=PT30S
firefly.executor.gateway.instance-location-lease=PT90S
firefly.executor.auth-token=
# Standalone can create a definition on first registration. Set false for controlled cluster registration.
firefly.executor.registration.auto-create-definition=true
